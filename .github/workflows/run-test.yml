# Ref: https://github.com/wjakob/nanobind_example/blob/master/.github/workflows/pip.yml

name: Run tests

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.14", "3.14t", "pypy3.11"]
        os: [ubuntu-latest, windows-latest, windows-11-arm, macos-latest, macos-15-intel]
        exclude:
          - python-version: "pypy3.11"
            os: windows-11-arm
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: true

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Set min macOS version
      if: runner.os == 'macOS'
      run: |
        echo "MACOSX_DEPLOYMENT_TARGET=10.14" >> $GITHUB_ENV

    - name: Build and install
      run: |
        python -m pip install pytest
        pip install --verbose . -C cmake.define.CMAKE_BUILD_TYPE=Debug

    - name: Test with pytest
      run: |
        cd tests
        python -m pytest -v --durations=5 

  build_external:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Build with external libosxr and install
      run: |
        sudo apt install -y libsoxr-dev
        pip install pytest
        pip install --verbose . -C cmake.define.USE_SYSTEM_LIBSOXR=ON

    - name: Test with pytest
      run: |
        cd tests
        python -m pytest -v --durations=5
